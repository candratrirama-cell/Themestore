<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tema infinix tecno itel</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --card: rgba(255, 255, 255, 0.08); 
            --accent: #ffffff;
            --text: #ffffff;
            --text-dim: #a1a1a6;
            --glass-border: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.3) 100%);
            --ios-blur: blur(30px) saturate(210%);
            --ios-bezier: cubic-bezier(0.25, 1, 0.5, 1);
            --heart: #ff3b30;
        }

        [data-theme="light"] {
            --bg: #f2f2f7;
            --card: rgba(0, 0, 0, 0.05);
            --accent: #000000;
            --text: #000000;
            --text-dim: #636366;
            --glass-border: linear-gradient(135deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.02) 50%, rgba(0,0,0,0.1) 100%);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; 
        }

        body { 
            background: var(--bg); color: var(--text); 
            transition: background 0.5s var(--ios-bezier); 
            min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .view { display: none; padding-bottom: 100px; }
        .view.active { display: block; animation: viewEnter 0.5s var(--ios-bezier); }
        @keyframes viewEnter { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 0 16px; }

        /* HEADER */
        header { padding: 12px 0 10px; }
        .brand-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .brand-row h1 { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        
        /* SEARCH BAR CRYSTAL */
        .search-bar { 
            background: var(--card); border-radius: 16px; 
            position: relative; display: flex; align-items: center; padding: 0 14px;
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
        }
        .search-bar::before {
            content: ""; position: absolute; inset: 0; padding: 1px;
            background: var(--glass-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; pointer-events: none; border-radius: 16px;
        }
        .search-bar input { 
            flex: 1; border: none; background: transparent; 
            padding: 12px 10px; color: var(--text); font-size: 16px; outline: none;
        }

        /* GRID THEME */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 10px; }
        .card { cursor: pointer; transition: 0.3s var(--ios-bezier); width: 100%; }
        .card-img { 
            width: 100%; aspect-ratio: 0.8; 
            border-radius: 24px; overflow: hidden; 
            background: var(--card); position: relative;
            margin-bottom: 8px;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-img::after {
            content: ""; position: absolute; inset: 0; padding: 1.5px;
            background: var(--glass-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; border-radius: 24px; pointer-events: none;
        }
        .card:active { transform: scale(0.94); }

        /* LIQUID GLASS DOCK - FIX KLIK */
        .dock-wrap { 
            position: fixed; bottom: 25px; left: 0; right: 0; 
            display: flex; justify-content: center; 
            z-index: 9999; /* Sangat tinggi agar tidak tertutup */
            pointer-events: none; /* Supaya area luar dock tembus klik */
        }
        .dock { 
            background: rgba(25, 25, 25, 0.4); 
            backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            padding: 6px; border-radius: 32px; display: flex; gap: 6px; 
            position: relative; pointer-events: auto; /* Aktifkan klik hanya di dock */
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2);
        }
        .dock::before {
            content: ""; position: absolute; inset: 0; padding: 1px;
            background: var(--glass-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; border-radius: 32px;
        }
        .dock-item { 
            width: 48px; height: 48px; border-radius: 24px; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--text-dim); transition: 0.4s var(--ios-bezier);
            cursor: pointer; position: relative; z-index: 2;
        }
        .dock-item.active { background: var(--accent); color: var(--bg); width: 110px; }
        .dock-item span { font-size: 13px; font-weight: 700; margin-left: 8px; display: none; }
        .dock-item.active span { display: block; }

        /* DETAIL PANEL */
        .panel { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 5000; 
            transform: translateY(100%); transition: 0.5s var(--ios-bezier); overflow-y: auto; padding-bottom: 140px;
        }
        .panel.active { transform: translateY(0); }
        .panel-nav { position: sticky; top: 0; padding: 16px; display: flex; justify-content: space-between; background: var(--bg); z-index: 6000; }

        .gallery { display: flex; gap: 12px; overflow-x: auto; scrollbar-width: none; padding: 0 16px; margin-bottom: 20px; scroll-snap-type: x mandatory; }
        .gallery-item { min-width: 280px; height: 480px; border-radius: 28px; overflow: hidden; position: relative; scroll-snap-align: center; background: var(--card); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-item::after { content: ""; position: absolute; inset: 0; padding: 1.5px; background: var(--glass-border); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; border-radius: 28px; }

        /* BUTTONS */
        .btn-round { width: 44px; height: 44px; border-radius: 22px; background: var(--card); color: var(--text); border: none; display: flex; align-items: center; justify-content: center; backdrop-filter: var(--ios-blur); cursor: pointer; position: relative; }
        .btn-round::after { content: ""; position: absolute; inset: 0; padding: 1px; background: var(--glass-border); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; border-radius: 22px; }

        /* APPLY BAR */
        .apply-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 10px)); 
            background: var(--card); backdrop-filter: var(--ios-blur); -webkit-backdrop-filter: var(--ios-blur);
            display: flex; flex-direction: column; gap: 12px;
            z-index: 7000; transform: translateY(100%); transition: 0.4s var(--ios-bezier);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
        }
        .panel.active ~ .apply-bar { transform: translateY(0); }
        .btn-apply { width: 100%; height: 54px; border-radius: 27px; background: var(--accent); color: var(--bg); border: none; font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: 700; z-index: 10000; opacity: 0; transition: 0.4s; pointer-events: none; }
        #toast.active { opacity: 1; top: 50px; }

        .stat-pill { background: var(--card); backdrop-filter: var(--ios-blur); padding: 8px 16px; border-radius: 14px; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; position: relative; }
        .stat-pill::after { content: ""; position: absolute; inset: 0; padding: 1px; background: var(--glass-border); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask-composite: exclude; border-radius: 14px; }
    </style>
</head>
<body data-theme="dark">

    <div id="toast">Notifikasi</div>

    <!-- HOME VIEW -->
    <div id="view-home" class="view active">
        <div class="container">
            <header>
                <div class="brand-row">
                    <h1>theme<span>X</span></h1>
                    <button class="btn-round" onclick="toggleTheme()"><i data-lucide="moon"></i></button>
                </div>
                <div class="search-bar">
                    <i data-lucide="search" style="color: var(--text-dim)"></i>
                    <input type="text" id="searchInput" placeholder="Cari tema premium..." oninput="doSearch()">
                </div>
            </header>
            <div class="grid" id="mainGrid"></div>
        </div>
    </div>

    <!-- BROWSE VIEW -->
    <div id="view-browse" class="view">
        <div class="container"><header><h1>Jelajahi</h1></header><div class="grid" id="browseGrid"></div></div>
    </div>

    <!-- FAV VIEW -->
    <div id="view-fav" class="view">
        <div class="container"><header><h1>Favorit</h1></header><div id="favGrid" class="grid"></div></div>
    </div>

    <!-- SETTINGS VIEW -->
    <div id="view-settings" class="view">
        <div class="container"><header><h1>Menu</h1></header>
            <div class="stat-pill" style="justify-content: space-between; padding: 20px; margin-bottom: 12px;" onclick="window.open('https://whatsapp.com/channel/0029VbB8MZt8V0ttSDmHn22j', '_blank')">
                <div style="display: flex; align-items: center; gap: 12px;"><i data-lucide="message-circle" style="color:#25D366"></i> Saluran WhatsApp</div>
                <i data-lucide="chevron-right"></i>
            </div>
        </div>
    </div>

    <!-- BOTTOM DOCK - FIX NAVIGASI -->
    <div class="dock-wrap" id="mainDock">
        <div class="dock">
            <div class="dock-item active" onclick="switchView('home', this)"><i data-lucide="home"></i><span>Beranda</span></div>
            <div class="dock-item" onclick="switchView('browse', this)"><i data-lucide="compass"></i><span>Jelajah</span></div>
            <div class="dock-item" onclick="switchView('fav', this)"><i data-lucide="heart"></i><span>Favorit</span></div>
            <div class="dock-item" onclick="switchView('settings', this)"><i data-lucide="menu"></i><span>Menu</span></div>
        </div>
    </div>

    <!-- DETAIL PANEL -->
    <div id="detailPanel" class="panel">
        <div class="panel-nav">
            <button class="btn-round" onclick="closeDetail()"><i data-lucide="chevron-down"></i></button>
            <button class="btn-round" onclick="copyShareLink()"><i data-lucide="share-2"></i></button>
        </div>
        <div class="gallery" id="detGallery"></div>
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div>
                    <h2 id="detTitle" style="font-size: 28px; font-weight: 800;">Nama Tema</h2>
                    <p id="detAuthor" style="color: var(--text-dim); font-weight: 600;">@kreator</p>
                </div>
                <button id="detLikeBtn" class="btn-round"><i data-lucide="heart"></i></button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div class="stat-pill"><i data-lucide="thumbs-up" style="width:14px; color:#ffcc00"></i> <span id="detLikeCount">0</span></div>
                <div class="stat-pill"><i data-lucide="box" style="width:14px; color:#34c759"></i> <span id="detSize">4.0 MB</span></div>
            </div>
            <p id="detDesc" style="line-height: 1.6; color: var(--text-dim); font-size: 15px;"></p>
        </div>
    </div>

    <!-- APPLY ACTION BAR -->
    <div class="apply-bar" id="bottomApplyBar">
        <button class="btn-tutorial" style="background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 10px; border-radius: 12px; font-weight: 700;" onclick="window.open('https://vt.tiktok.com/ZSmoDshWL/', '_blank')">Tutorial Pemasangan</button>
        <button class="btn-apply" id="installBtn"><i data-lucide="download"></i> UNDUH TEMA</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://miningtransaction-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let allData = [];
        let favorites = JSON.parse(localStorage.getItem('themeX_favs') || '[]');
        let likedItems = JSON.parse(localStorage.getItem('themeX_liked') || '[]');
        let currentItem = null;

        onValue(ref(db, 'apps/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                allData = Object.keys(data).filter(key => !data[key].is_apk).map(key => ({ 
                    id: key, ...data[key], likes: data[key].likes || 0
                }));
                refreshView();
            }
        });

        function refreshView() {
            const activeView = document.querySelector('.view.active').id;
            if(activeView === 'view-home') renderItems(allData, 'mainGrid');
            if(activeView === 'view-browse') renderItems([...allData].reverse(), 'browseGrid');
            if(activeView === 'view-fav') renderItems(allData.filter(i => favorites.includes(i.id)), 'favGrid');
        }

        function renderItems(items, gridId) {
            const grid = document.getElementById(gridId);
            if (!grid) return;
            grid.innerHTML = items.length ? '' : '<p style="grid-column: 1/-1; text-align:center; padding: 50px; opacity: 0.4;">Kosong.</p>';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => openDetail(item);
                div.innerHTML = `
                    <div class="card-img"><img src="${item.images ? item.images[0] : ''}" loading="lazy"></div>
                    <div style="padding: 0 4px;">
                        <p style="font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.name}</p>
                        <p style="font-size: 11px; color: var(--text-dim); font-weight: 600;">${item.dev || 'themeX'}</p>
                    </div>
                `;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        window.switchView = (viewName, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            el.classList.add('active');
            refreshView();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.openDetail = (item) => {
            currentItem = item;
            document.getElementById('detTitle').innerText = item.name;
            document.getElementById('detAuthor').innerText = item.dev || 'Verified Creator';
            document.getElementById('detLikeCount').innerText = item.likes;
            document.getElementById('detSize').innerText = item.size || '3.8 MB';
            document.getElementById('detDesc').innerText = item.desc || "Nikmati visual premium dengan tema eksklusif ini.";
            
            const gallery = document.getElementById('detGallery');
            gallery.innerHTML = '';
            (item.images || []).forEach(img => {
                gallery.innerHTML += `<div class="gallery-item"><img src="${img}"></div>`;
            });

            document.getElementById('detLikeBtn').style.color = likedItems.includes(item.id) ? 'var(--heart)' : 'var(--text)';
            document.getElementById('detLikeBtn').onclick = () => handleLike(item.id);

            document.getElementById('installBtn').onclick = () => {
                showToast("Menyiapkan unduhan...");
                setTimeout(() => window.open(item.link, '_blank'), 800);
            };

            document.getElementById('detailPanel').classList.add('active');
            document.getElementById('mainDock').style.opacity = '0';
            document.getElementById('mainDock').style.pointerEvents = 'none';
        };

        window.closeDetail = () => {
            document.getElementById('detailPanel').classList.remove('active');
            document.getElementById('mainDock').style.opacity = '1';
            document.getElementById('mainDock').style.pointerEvents = 'auto';
        };

        function handleLike(id) {
            if (likedItems.includes(id)) return;
            runTransaction(ref(db, `apps/${id}/likes`), (c) => (c || 0) + 1).then(() => {
                likedItems.push(id);
                if(!favorites.includes(id)) favorites.push(id);
                localStorage.setItem('themeX_liked', JSON.stringify(likedItems));
                localStorage.setItem('themeX_favs', JSON.stringify(favorites));
                document.getElementById('detLikeBtn').style.color = 'var(--heart)';
                showToast("Berhasil disukai!");
            });
        }

        window.toggleTheme = () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            lucide.createIcons();
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('active');
            setTimeout(() => t.classList.remove('active'), 2000);
        };

        window.doSearch = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderItems(allData.filter(i => i.name.toLowerCase().includes(term)), 'mainGrid');
        };

        lucide.createIcons();
    </script>
</body>
</html>
